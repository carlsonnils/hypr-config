# =============================================================================
# Hyprlock Configuration — Kanagawa Theme
# =============================================================================

general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

# --- Background --------------------------------------------------------------
background {
    monitor  =
    path     = ~/.config/hyprpaper/wallpaper.jpg   # same wallpaper as desktop
    blur_size    = 7
    blur_passes  = 3
    brightness   = 0.6
    contrast     = 0.9
    vibrancy     = 0.2
    vibrancy_darkness = 0.0
}

# --- Clock -------------------------------------------------------------------
label {
    monitor  =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(220, 215, 186, 1.0)   # fg
    font_size   = 96
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 3
    shadow_size   = 10

    position = 0, 160
    halign   = center
    valign   = center
}

label {
    monitor  =
    text     = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color    = rgba(192, 163, 110, 1.0)   # yellow
    font_size   = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 60
    halign   = center
    valign   = center
}

# --- Password input ----------------------------------------------------------
input-field {
    monitor  =
    size     = 400, 48
    outline_thickness = 2
    dots_size         = 0.4
    dots_spacing      = 0.2
    dots_center       = true
    dots_rounding     = -1

    outer_color  = rgba(126, 156, 216, 1.0)   # blue
    inner_color  = rgba(31, 31, 40, 0.92)     # bg0
    font_color   = rgba(220, 215, 186, 1.0)   # fg
    font_size    = 18
    fade_on_empty     = true
    fade_timeout      = 1000
    placeholder_text  = <i>Password...</i>
    hide_input        = false
    rounding          = 8

    check_color  = rgba(106, 149, 137, 1.0)   # teal
    fail_color   = rgba(195, 64, 67, 1.0)     # red
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000

    position = 0, -60
    halign   = center
    valign   = center
}

# --- User label --------------------------------------------------------------
label {
    monitor  =
    text     = 󰀄  $USER
    color    = rgba(149, 127, 184, 1.0)   # purple
    font_size   = 26
    font_family = JetBrainsMono Nerd Font

    position = 0, -20
    halign   = center
    valign   = center
}
